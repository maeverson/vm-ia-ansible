---
- name: "NVIDIA | Instalar pacotes base"
  ansible.builtin.apt:
    name:
      - build-essential
      - dkms
      - "linux-headers-{{ ansible_kernel }}"
      - curl
      - wget
      - git
      - htop
      - nvtop
      - pciutils
      - gnupg
      - ca-certificates
      - qemu-guest-agent
    state: present
    update_cache: true

- name: "NVIDIA | Habilitar qemu-guest-agent"
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: "NVIDIA | Baixar cuda-keyring"
  ansible.builtin.get_url:
    url: "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb"
    dest: /tmp/cuda-keyring_1.1-1_all.deb
    mode: '0644'

- name: "NVIDIA | Instalar cuda-keyring"
  ansible.builtin.apt:
    deb: /tmp/cuda-keyring_1.1-1_all.deb
  register: keyring_install

- name: "NVIDIA | Atualizar cache apt"
  ansible.builtin.apt:
    update_cache: true
  when: keyring_install is changed

- name: "NVIDIA | Instalar driver e utilitarios"
  ansible.builtin.apt:
    name:
      - nvidia-driver-555-server
      - nvidia-utils-555-server
    state: present
  register: nvidia_install

- name: "NVIDIA | Reboot apos instalacao do driver"
  ansible.builtin.reboot:
    msg: "Reboot para carregar driver NVIDIA"
    reboot_timeout: 600
    pre_reboot_delay: 5
  when: nvidia_install is changed

- name: "NVIDIA | Validar driver carregado"
  ansible.builtin.shell: nvidia-smi
  register: nvidia_smi
  changed_when: false
  failed_when: nvidia_smi.rc != 0

- name: "NVIDIA | Status do driver"
  ansible.builtin.debug:
    var: nvidia_smi.stdout_lines
